<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Mission: Angle Dock</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020617;color:white;font-family:Arial,Helvetica,sans-serif;touch-action:none;overscroll-behavior:none}body{display:flex;justify-content:center;align-items:center}.app{width:100vw;height:100dvh;max-width:940px;display:grid;grid-template-rows:auto auto 1fr auto;overflow:hidden;background:radial-gradient(circle at 20% 10%,rgba(125,92,255,.24),transparent 30%),radial-gradient(circle at 78% 15%,rgba(94,233,255,.18),transparent 25%),linear-gradient(#071329,#040816)}.top{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 10px;border-bottom:1px solid rgba(94,233,255,.42);background:rgba(2,6,23,.82);box-shadow:0 0 20px rgba(94,233,255,.16)}h1{margin:0;font-size:clamp(17px,5vw,29px);line-height:1.05;text-shadow:0 0 10px rgba(94,233,255,.75);white-space:nowrap}.scorebar{display:flex;gap:5px;font-weight:900;font-size:clamp(12px,3.4vw,16px);white-space:nowrap}.pill{border:1px solid rgba(94,233,255,.45);background:rgba(15,23,42,.86);border-radius:999px;padding:6px 8px;color:#e0f2fe;box-shadow:inset 0 0 12px rgba(94,233,255,.12)}.rulebar{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:6px 8px;background:rgba(4,8,22,.86);border-bottom:1px solid rgba(94,233,255,.32);text-align:center;font-weight:900;font-size:clamp(11px,3vw,15px);line-height:1.15}.rulebar div{border-radius:12px;padding:6px 2px;border:1px solid rgba(255,255,255,.16);box-shadow:inset 0 0 14px rgba(255,255,255,.06)}.rulebar div:nth-child(1){background:rgba(251,191,36,.22);border-color:rgba(251,191,36,.55)}.rulebar div:nth-child(2){background:rgba(37,99,235,.26);border-color:rgba(94,233,255,.6)}.rulebar div:nth-child(3){background:rgba(236,72,153,.24);border-color:rgba(255,125,233,.6)}.game-area{position:relative;min-height:0;overflow:hidden;background:linear-gradient(#06152d,#030712)}canvas{width:100%;height:100%;display:block;touch-action:none}.feedback{position:absolute;left:50%;top:8px;transform:translateX(-50%);z-index:4;max-width:94vw;padding:8px 13px;border:2px solid rgba(94,233,255,.8);border-radius:999px;background:rgba(2,6,23,.88);box-shadow:0 0 22px rgba(94,233,255,.35);text-align:center;font-size:clamp(15px,4vw,22px);font-weight:900;opacity:0;pointer-events:none;transition:opacity .12s}.feedback.show{opacity:1}.overlay{position:absolute;inset:0;z-index:10;display:grid;place-items:center;padding:14px;background:radial-gradient(circle at 50% 20%,rgba(94,233,255,.18),transparent 35%),rgba(2,6,23,.86);text-align:center}.card{width:min(540px,94vw);background:rgba(8,18,45,.94);border:1px solid rgba(94,233,255,.48);border-radius:24px;box-shadow:0 0 35px rgba(94,233,255,.22),inset 0 0 22px rgba(94,233,255,.06);padding:18px}.card h2{margin:0 0 10px;font-size:clamp(25px,8vw,42px);line-height:1.05;text-shadow:0 0 12px rgba(94,233,255,.8)}.card p{margin:8px 0;font-size:clamp(15px,4vw,18px);line-height:1.35;color:#dbeafe}.btn{border:1px solid rgba(94,233,255,.8);border-radius:18px;background:linear-gradient(#0891b2,#1d4ed8);color:white;font-size:clamp(18px,5vw,23px);font-weight:900;padding:13px 24px;margin-top:10px;box-shadow:0 6px 0 #0f172a,0 0 24px rgba(94,233,255,.45);cursor:pointer}.btn:active{transform:translateY(3px);box-shadow:0 3px 0 #0f172a,0 0 16px rgba(94,233,255,.45)}.controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px;padding-bottom:max(8px,env(safe-area-inset-bottom));background:rgba(2,6,23,.92);border-top:1px solid rgba(94,233,255,.42)}.move{border:1px solid rgba(94,233,255,.65);border-radius:20px;min-height:58px;background:radial-gradient(circle at 50% 100%,rgba(94,233,255,.25),transparent 42%),linear-gradient(#172554,#020617);color:white;font-size:clamp(24px,8vw,38px);font-weight:900;cursor:pointer;touch-action:manipulation;box-shadow:inset 0 0 18px rgba(94,233,255,.14),0 0 14px rgba(94,233,255,.16)}.move:active{transform:scale(.98);box-shadow:inset 0 0 24px rgba(94,233,255,.28),0 0 20px rgba(94,233,255,.28)}@media(min-width:700px){.app{height:min(100dvh,780px);border-radius:24px;box-shadow:0 18px 52px rgba(0,0,0,.55);border:1px solid rgba(94,233,255,.28)}.top{padding:12px 16px}.rulebar{padding:8px 14px;gap:10px}.controls{padding:12px 16px 16px}}@media(max-height:610px){.rulebar{display:none}.move{min-height:48px}}
</style>
</head>
<body>
<main class="app">
<header class="top"><h1>Mission: Angle Dock</h1><div class="scorebar"><span class="pill"><span id="qNo">0</span>/<span id="total">10</span></span><span class="pill">Score <span id="score">0</span></span></div></header>
<section class="rulebar"><div>Acute<br>&lt; 90°</div><div>Right<br>= 90°</div><div>Obtuse<br>&gt; 90°</div></section>
<section class="game-area" id="gameArea"><canvas id="game"></canvas><div class="feedback" id="feedback"></div><div class="overlay" id="startOverlay"><div class="card"><h2>Angle Dock</h2><p>Move the falling hologram left or right.</p><p>Dock it into the correct angle bay.</p><p>No degree or answer label is shown. Judge by the angle shape.</p><button class="btn" id="startBtn">Start Mission</button></div></div><div class="overlay" id="endOverlay" style="display:none"><div class="card"><h2 id="endTitle">Mission Complete!</h2><p id="endText"></p><button class="btn" id="restartBtn">Play Again</button></div></div></section>
<footer class="controls"><button class="move" id="leftBtn">←</button><button class="move" id="rightBtn">→</button></footer>
</main>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),gameArea=document.getElementById('gameArea');
const qNoEl=document.getElementById('qNo'),totalEl=document.getElementById('total'),scoreEl=document.getElementById('score'),feedbackEl=document.getElementById('feedback'),startOverlay=document.getElementById('startOverlay'),endOverlay=document.getElementById('endOverlay'),endTitle=document.getElementById('endTitle'),endText=document.getElementById('endText');
const TOTAL=10;totalEl.textContent=TOTAL;
let W=360,H=520,score=0,qNo=0,running=false,current=null,raf=null,leftHeld=false,rightHeld=false,keys={},feedbackTimer=null,flash=null,particles=[],stars=[];
let binTop=0,binHeight=92,binMargin=8,binGap=5,binWidth=0;
const questionBank=[{type:'acute',deg:30},{type:'acute',deg:40},{type:'acute',deg:55},{type:'acute',deg:65},{type:'right',deg:90},{type:'right',deg:90},{type:'obtuse',deg:110},{type:'obtuse',deg:125},{type:'obtuse',deg:140},{type:'obtuse',deg:150}];
const bins=[{type:'acute',label:'ACUTE',sub:'< 90°',fill:'rgba(251,191,36,.20)',stroke:'#ffd166',glow:'rgba(255,209,102,.55)'},{type:'right',label:'RIGHT',sub:'= 90°',fill:'rgba(37,99,235,.22)',stroke:'#5ee9ff',glow:'rgba(94,233,255,.55)'},{type:'obtuse',label:'OBTUSE',sub:'> 90°',fill:'rgba(236,72,153,.22)',stroke:'#ff7de9',glow:'rgba(255,125,233,.55)'}];
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}let questions=shuffle(questionBank);
function clamp(n,min,max){return Math.max(min,Math.min(max,n))}
function makeStars(){stars=[];const count=Math.max(55,Math.min(130,Math.floor(W*H/3600)));for(let i=0;i<count;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.4,a:Math.random()*.75+.2,s:Math.random()*.24+.04})}
function resize(){const rect=gameArea.getBoundingClientRect(),dpr=Math.max(1,Math.min(devicePixelRatio||1,2));canvas.width=Math.floor(rect.width*dpr);canvas.height=Math.floor(rect.height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);W=rect.width;H=rect.height;binMargin=Math.max(6,W*.02);binGap=Math.max(4,W*.012);binHeight=Math.max(78,Math.min(108,H*.18));binTop=H-binHeight-8;binWidth=(W-binMargin*2-binGap*2)/3;if(current){current.cardW=Math.max(120,Math.min(180,W*.42));current.cardH=Math.max(112,Math.min(150,H*.22));current.x=clamp(current.x,current.cardW/2+4,W-current.cardW/2-4)}makeStars();draw()}
function startGame(){score=0;qNo=0;particles=[];flash=null;questions=shuffle(questionBank);running=true;startOverlay.style.display='none';endOverlay.style.display='none';scoreEl.textContent=score;qNoEl.textContent=qNo;nextAngle();if(raf)cancelAnimationFrame(raf);loop()}
function endGame(){running=false;if(raf)cancelAnimationFrame(raf);endTitle.textContent=score>=8?'Excellent Docking!':'Good Practice!';endText.textContent='You docked '+score+' out of '+TOTAL+' angles correctly.';endOverlay.style.display='grid';draw()}
function nextAngle(){if(qNo>=TOTAL){endGame();return}const data=questions[qNo++];qNoEl.textContent=qNo;scoreEl.textContent=score;const cardW=Math.max(120,Math.min(180,W*.42)),cardH=Math.max(112,Math.min(150,H*.22));current={type:data.type,deg:data.deg,x:W/2,y:-cardH/2-8,cardW,cardH,speed:Math.max(1.6,Math.min(2.8,H/245)),landed:false,wobble:Math.random()*Math.PI*2}}
function answerText(t,d){if(t==='acute')return d+'° is smaller than 90°.';if(t==='right')return d+'° is exactly 90°.';return d+'° is bigger than 90°.'}
function showFeedback(text,good){clearTimeout(feedbackTimer);feedbackEl.textContent=text;feedbackEl.style.borderColor=good?'#22c55e':'#ef4444';feedbackEl.style.boxShadow=good?'0 0 24px rgba(34,197,94,.55)':'0 0 24px rgba(239,68,68,.55)';feedbackEl.style.color=good?'#dcfce7':'#fee2e2';feedbackEl.classList.add('show');feedbackTimer=setTimeout(()=>feedbackEl.classList.remove('show'),1000)}
function getBinAtX(x){for(let i=0;i<3;i++){const bx=binMargin+i*(binWidth+binGap);if(x>=bx&&x<=bx+binWidth)return{...bins[i],index:i}}return null}
function burst(x,y,good,colour){const n=good?28:16;for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*(good?4.5:3.2)+1.2;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:good?34:24,maxLife:good?34:24,r:Math.random()*3+2,colour:colour||(good?'#22c55e':'#ef4444')})}}
function checkLanding(){if(!current||current.landed)return;if(current.y+current.cardH/2>=binTop+6){current.landed=true;const caught=getBinAtX(current.x),binX=caught?binMargin+caught.index*(binWidth+binGap)+binWidth/2:current.x,binY=binTop+binHeight*.25;if(caught&&caught.type===current.type){score++;scoreEl.textContent=score;showFeedback('Correct Dock!',true);burst(binX,binY,true,caught.stroke);flash={type:'good',life:18,binIndex:caught.index}}else{showFeedback(answerText(current.type,current.deg),false);burst(current.x,binTop+12,false,'#ef4444');flash={type:'bad',life:18,binIndex:caught?caught.index:-1}}setTimeout(nextAngle,760)}}
function update(){if(running&&current){const moveSpeed=Math.max(5.8,W*.018);if(leftHeld||keys.ArrowLeft)current.x-=moveSpeed;if(rightHeld||keys.ArrowRight)current.x+=moveSpeed;current.x=clamp(current.x,current.cardW/2+4,W-current.cardW/2-4);if(!current.landed){current.y+=current.speed;current.wobble+=.05;checkLanding()}}for(const s of stars){s.y+=s.s;if(s.y>H){s.y=0;s.x=Math.random()*W}}particles=particles.filter(p=>p.life>0);for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vx*=.96;p.vy*=.96;p.life--}if(flash){flash.life--;if(flash.life<=0)flash=null}}
function rr(x,y,w,h,r){const m=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+m,y);ctx.lineTo(x+w-m,y);ctx.quadraticCurveTo(x+w,y,x+w,y+m);ctx.lineTo(x+w,y+h-m);ctx.quadraticCurveTo(x+w,y+h,x+w-m,y+h);ctx.lineTo(x+m,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-m);ctx.lineTo(x,y+m);ctx.quadraticCurveTo(x,y,x+m,y);ctx.closePath()}
function drawBackground(){ctx.clearRect(0,0,W,H);let grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,'#06152d');grad.addColorStop(.55,'#071329');grad.addColorStop(1,'#020617');ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);let g=ctx.createRadialGradient(W*.15,H*.18,10,W*.15,H*.18,W*.52);g.addColorStop(0,'rgba(94,233,255,.18)');g.addColorStop(1,'rgba(94,233,255,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);g=ctx.createRadialGradient(W*.85,H*.28,10,W*.85,H*.28,W*.48);g.addColorStop(0,'rgba(255,125,233,.16)');g.addColorStop(1,'rgba(255,125,233,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.save();ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(W*.82,H*.16,Math.max(20,W*.08),0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(94,233,255,.8)';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(W*.82,H*.16,Math.max(34,W*.13),Math.max(7,W*.025),-.35,0,Math.PI*2);ctx.stroke();ctx.restore();for(const s of stars){ctx.fillStyle='rgba(255,255,255,'+s.a+')';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill()}ctx.fillStyle='rgba(2,6,23,.58)';ctx.strokeStyle='rgba(94,233,255,.35)';ctx.lineWidth=1;rr(10,10,Math.min(W-20,330),38,13);ctx.fill();ctx.stroke();ctx.fillStyle='#dbeafe';ctx.font='800 '+Math.max(13,Math.min(16,W*.04))+'px Arial';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText('Guide the angle into the correct dock.',22,29)}
function drawBins(){for(let i=0;i<3;i++){const b=bins[i],x=binMargin+i*(binWidth+binGap),y=binTop,active=flash&&flash.binIndex===i;ctx.save();ctx.shadowColor=active?(flash.type==='good'?'rgba(34,197,94,.9)':'rgba(239,68,68,.9)'):b.glow;ctx.shadowBlur=active?28:16;let bg=ctx.createLinearGradient(x,y,x,y+binHeight);bg.addColorStop(0,'rgba(255,255,255,.12)');bg.addColorStop(.45,b.fill);bg.addColorStop(1,'rgba(2,6,23,.65)');ctx.fillStyle=bg;ctx.strokeStyle=active?(flash.type==='good'?'#22c55e':'#ef4444'):b.stroke;ctx.lineWidth=Math.max(3,W*.008);rr(x,y,binWidth,binHeight,16);ctx.fill();ctx.stroke();ctx.shadowColor='transparent';ctx.fillStyle='rgba(2,6,23,.55)';rr(x+8,y+8,binWidth-16,binHeight*.25,9);ctx.fill();for(let k=0;k<3;k++){ctx.fillStyle=k===1?b.stroke:'rgba(255,255,255,.55)';ctx.beginPath();ctx.arc(x+binWidth*(.28+k*.22),y+20,3,0,Math.PI*2);ctx.fill()}ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='900 '+Math.max(15,Math.min(24,binHeight*.26))+'px Arial';ctx.shadowColor=b.glow;ctx.shadowBlur=10;ctx.fillText(b.label,x+binWidth/2,y+binHeight*.49);ctx.fillStyle='#dbeafe';ctx.font='900 '+Math.max(13,Math.min(19,binHeight*.19))+'px Arial';ctx.shadowBlur=0;ctx.fillText(b.sub,x+binWidth/2,y+binHeight*.73);ctx.restore()}}
function drawAngle(a){if(!a)return;ctx.save();ctx.translate(a.x+Math.sin(a.wobble)*2.5,a.y);const cw=a.cardW,ch=a.cardH;ctx.shadowColor='rgba(94,233,255,.75)';ctx.shadowBlur=22;let pg=ctx.createLinearGradient(0,-ch/2,0,ch/2);pg.addColorStop(0,'rgba(94,233,255,.28)');pg.addColorStop(.45,'rgba(15,23,42,.94)');pg.addColorStop(1,'rgba(37,99,235,.34)');ctx.fillStyle=pg;ctx.strokeStyle='#5ee9ff';ctx.lineWidth=3;rr(-cw/2,-ch/2,cw,ch,18);ctx.fill();ctx.stroke();ctx.shadowColor='transparent';ctx.fillStyle='#5ee9ff';for(const [x,y] of [[-cw/2+16,-ch/2+16],[cw/2-16,-ch/2+16],[-cw/2+16,ch/2-16],[cw/2-16,ch/2-16]]){ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill()}const vx=0,vy=ch*.24,ray=Math.min(cw*.43,ch*.56),rad=-a.deg*Math.PI/180;ctx.lineCap='round';ctx.strokeStyle='#fff';ctx.shadowColor='rgba(255,255,255,.8)';ctx.shadowBlur=8;ctx.lineWidth=Math.max(6,cw*.047);ctx.beginPath();ctx.moveTo(vx,vy);ctx.lineTo(vx+ray,vy);ctx.stroke();ctx.beginPath();ctx.moveTo(vx,vy);ctx.lineTo(vx+ray*Math.cos(rad),vy+ray*Math.sin(rad));ctx.stroke();ctx.shadowBlur=0;ctx.strokeStyle='#5ee9ff';ctx.lineWidth=Math.max(3,cw*.025);ctx.beginPath();ctx.arc(vx,vy,ray*.38,0,rad,true);ctx.stroke();if(a.deg===90){const s=ray*.28;ctx.strokeStyle='#ffd166';ctx.beginPath();ctx.moveTo(vx+s,vy);ctx.lineTo(vx+s,vy-s);ctx.lineTo(vx,vy-s);ctx.stroke()}ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(94,233,255,.9)';ctx.shadowBlur=10;ctx.font='900 '+Math.max(25,Math.min(38,cw*.23))+'px Arial';ctx.fillText(a.deg+'°',0,-ch*.32);ctx.shadowColor='rgba(94,233,255,.8)';ctx.shadowBlur=16;ctx.fillStyle='rgba(94,233,255,.55)';ctx.beginPath();ctx.ellipse(0,ch/2+6,cw*.22,7,0,0,Math.PI*2);ctx.fill();ctx.restore()}
function drawParticles(){for(const p of particles){const a=p.life/p.maxLife;ctx.save();ctx.globalAlpha=a;ctx.fillStyle=p.colour;ctx.shadowColor=p.colour;ctx.shadowBlur=8;ctx.beginPath();ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2);ctx.fill();ctx.restore()}}
function draw(){drawBackground();drawBins();drawAngle(current);drawParticles()}
function loop(){update();draw();raf=requestAnimationFrame(loop)}
function pointerX(e){return e.clientX-canvas.getBoundingClientRect().left}
canvas.addEventListener('pointerdown',e=>{if(!running||!current||current.landed)return;current.x=clamp(pointerX(e),current.cardW/2+4,W-current.cardW/2-4);canvas.setPointerCapture(e.pointerId)});
canvas.addEventListener('pointermove',e=>{if(!running||!current||current.landed)return;if(e.buttons===1||e.pointerType==='touch')current.x=clamp(pointerX(e),current.cardW/2+4,W-current.cardW/2-4)});
function hold(btn,dir){btn.addEventListener('pointerdown',e=>{e.preventDefault();if(dir<0)leftHeld=true;else rightHeld=true});for(const ev of ['pointerup','pointercancel','pointerleave'])btn.addEventListener(ev,()=>{if(dir<0)leftHeld=false;else rightHeld=false})}
hold(document.getElementById('leftBtn'),-1);hold(document.getElementById('rightBtn'),1);
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='ArrowRight'){keys[e.key]=true;e.preventDefault()}});document.addEventListener('keyup',e=>{keys[e.key]=false});document.getElementById('startBtn').addEventListener('click',startGame);document.getElementById('restartBtn').addEventListener('click',startGame);window.addEventListener('resize',resize);window.addEventListener('orientationchange',()=>setTimeout(resize,200));resize();draw();
</script>
</body>
</html>
