<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mission: Angle Dock</title>
  <style>
    :root {
      --space0: #020617;
      --space1: #071329;
      --cyan: #5ee9ff;
      --green: #22c55e;
      --red: #ef4444;
      --gold: #ffd166;
      --pink: #ff7de9;
      --line: rgba(94, 233, 255, 0.42);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020617;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      touch-action: none;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      width: 100vw;
      height: 100dvh;
      max-width: 940px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 10%, rgba(125, 92, 255, 0.25), transparent 30%),
        radial-gradient(circle at 78% 15%, rgba(94, 233, 255, 0.18), transparent 25%),
        linear-gradient(180deg, var(--space1), var(--space0));
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(2, 6, 23, 0.86);
      box-shadow: 0 0 20px rgba(94, 233, 255, 0.16);
    }

    h1 {
      margin: 0;
      font-size: clamp(16px, 4.7vw, 29px);
      line-height: 1.05;
      color: #ffffff;
      text-shadow: 0 0 10px rgba(94, 233, 255, 0.75);
      white-space: nowrap;
    }

    .scorebar {
      display: flex;
      gap: 5px;
      align-items: center;
      font-weight: 900;
      font-size: clamp(12px, 3.4vw, 16px);
      white-space: nowrap;
    }

    .pill {
      border: 1px solid rgba(94, 233, 255, 0.45);
      background: rgba(15, 23, 42, 0.86);
      border-radius: 999px;
      padding: 6px 8px;
      color: #e0f2fe;
      box-shadow: inset 0 0 12px rgba(94, 233, 255, 0.12);
    }

    .rulebar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      padding: 6px 8px;
      background: rgba(4, 8, 22, 0.9);
      border-bottom: 1px solid rgba(94, 233, 255, 0.32);
      text-align: center;
      font-weight: 900;
      font-size: clamp(11px, 3vw, 15px);
      line-height: 1.15;
    }

    .rulebar div {
      border-radius: 12px;
      padding: 6px 2px;
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: inset 0 0 14px rgba(255,255,255,0.06);
    }

    .rulebar div:nth-child(1) {
      background: rgba(251, 191, 36, 0.22);
      border-color: rgba(251, 191, 36, 0.55);
    }

    .rulebar div:nth-child(2) {
      background: rgba(37, 99, 235, 0.26);
      border-color: rgba(94, 233, 255, 0.60);
    }

    .rulebar div:nth-child(3) {
      background: rgba(236, 72, 153, 0.24);
      border-color: rgba(255, 125, 233, 0.60);
    }

    .game-area {
      position: relative;
      min-height: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 25%, rgba(94, 233, 255, 0.10), transparent 22%),
        radial-gradient(circle at 85% 40%, rgba(255, 125, 233, 0.10), transparent 22%),
        linear-gradient(180deg, #06152d 0%, #030712 100%);
    }

    canvas { width: 100%; height: 100%; display: block; touch-action: none; }

    .feedback {
      position: absolute;
      left: 50%;
      top: 8px;
      transform: translateX(-50%);
      z-index: 4;
      max-width: 94vw;
      padding: 8px 13px;
      border: 2px solid rgba(94, 233, 255, 0.8);
      border-radius: 999px;
      background: rgba(2, 6, 23, 0.9);
      color: #ffffff;
      box-shadow: 0 0 22px rgba(94, 233, 255, 0.35);
      text-align: center;
      font-size: clamp(15px, 4vw, 22px);
      font-weight: 900;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s ease;
    }

    .feedback.show { opacity: 1; }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 14px;
      background:
        radial-gradient(circle at 50% 20%, rgba(94, 233, 255, 0.18), transparent 35%),
        rgba(2, 6, 23, 0.86);
      text-align: center;
    }

    .card {
      width: min(540px, 94vw);
      background: rgba(8, 18, 45, 0.96);
      border: 1px solid rgba(94, 233, 255, 0.48);
      border-radius: 24px;
      box-shadow: 0 0 35px rgba(94, 233, 255, 0.22), inset 0 0 22px rgba(94, 233, 255, 0.06);
      padding: 18px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: clamp(25px, 8vw, 42px);
      line-height: 1.05;
      color: #ffffff;
      text-shadow: 0 0 12px rgba(94, 233, 255, 0.8);
    }

    .card p {
      margin: 8px 0;
      font-size: clamp(15px, 4vw, 18px);
      line-height: 1.35;
      color: #dbeafe;
    }

    .btn {
      border: 1px solid rgba(94, 233, 255, 0.8);
      border-radius: 18px;
      background: linear-gradient(180deg, #0891b2, #1d4ed8);
      color: white;
      font-size: clamp(18px, 5vw, 23px);
      font-weight: 900;
      padding: 13px 24px;
      margin-top: 10px;
      box-shadow: 0 6px 0 #0f172a, 0 0 24px rgba(94, 233, 255, 0.45);
      cursor: pointer;
    }

    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #0f172a, 0 0 16px rgba(94, 233, 255, 0.45);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 8px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      background: rgba(2, 6, 23, 0.94);
      border-top: 1px solid var(--line);
    }

    .move {
      border: 1px solid rgba(94, 233, 255, 0.65);
      border-radius: 20px;
      min-height: 58px;
      background:
        radial-gradient(circle at 50% 100%, rgba(94, 233, 255, 0.25), transparent 42%),
        linear-gradient(180deg, #172554, #020617);
      color: white;
      font-size: clamp(24px, 8vw, 38px);
      font-weight: 900;
      cursor: pointer;
      touch-action: manipulation;
    }

    .move:active { transform: scale(0.98); }

    @media (min-width: 700px) {
      .app {
        height: min(100dvh, 780px);
        border-radius: 24px;
        box-shadow: 0 18px 52px rgba(0,0,0,0.55);
        border: 1px solid rgba(94, 233, 255, 0.28);
      }
      .top { padding: 12px 16px; }
      .rulebar { padding: 8px 14px; gap: 10px; }
      .controls { padding: 12px 16px 16px; }
    }

    @media (max-height: 610px) {
      .rulebar { display: none; }
      .move { min-height: 48px; }
    }
  </style>
  <script src="https://cdn.counter.dev/script.js" data-id="825e93b6-ce99-40ef-8bcc-125f13297433" data-utcoffset="8"></script>
</head>
<body>
  <main class="app">
    <header class="top">
      <h1>Mission: Angle Dock</h1>
      <div class="scorebar">
        <span class="pill"><span id="qNo">0</span>/<span id="total">10</span></span>
        <span class="pill">Score <span id="score">0</span></span>
      </div>
    </header>

    <section class="rulebar">
      <div>Acute<br>&lt; 90°</div>
      <div>Right<br>= 90°</div>
      <div>Obtuse<br>&gt; 90°</div>
    </section>

    <section class="game-area" id="gameArea">
      <canvas id="game"></canvas>
      <div class="feedback" id="feedback"></div>

      <div class="overlay" id="startOverlay">
        <div class="card">
          <h2>Angle Dock</h2>
          <p>Move the falling rocket left or right.</p>
          <p>Dock it into the correct angle bay.</p>
          <p>No degree or answer label is shown. Judge by the angle shape.</p>
          <button class="btn" id="startBtn">Start Mission</button>
        </div>
      </div>

      <div class="overlay" id="endOverlay" style="display:none;">
        <div class="card">
          <h2 id="endTitle">Mission Complete!</h2>
          <p id="endText"></p>
          <button class="btn" id="restartBtn">Play Again</button>
        </div>
      </div>
    </section>

    <footer class="controls">
      <button class="move" id="leftBtn" aria-label="Move left">←</button>
      <button class="move" id="rightBtn" aria-label="Move right">→</button>
    </footer>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const gameArea = document.getElementById("gameArea");
    const qNoEl = document.getElementById("qNo");
    const totalEl = document.getElementById("total");
    const scoreEl = document.getElementById("score");
    const feedbackEl = document.getElementById("feedback");
    const startOverlay = document.getElementById("startOverlay");
    const endOverlay = document.getElementById("endOverlay");
    const endTitle = document.getElementById("endTitle");
    const endText = document.getElementById("endText");

    const TOTAL = 10;
    totalEl.textContent = TOTAL;

    let W = 360, H = 520;
    let score = 0, qNo = 0, running = false;
    let current = null, raf = null;
    let leftHeld = false, rightHeld = false, keys = {};
    let feedbackTimer = null, flash = null, particles = [], stars = [];
    let audioCtx = null, isDraggingAngle = false;

    let binTop = 0, binHeight = 92, binMargin = 8, binGap = 5, binWidth = 0;

    const questionBank = [
      { type: "acute", deg: 30 },
      { type: "acute", deg: 40 },
      { type: "acute", deg: 55 },
      { type: "acute", deg: 65 },
      { type: "right", deg: 90 },
      { type: "right", deg: 90 },
      { type: "obtuse", deg: 110 },
      { type: "obtuse", deg: 125 },
      { type: "obtuse", deg: 140 },
      { type: "obtuse", deg: 150 }
    ];

    const bins = [
      { type: "acute", label: "ACUTE", sub: "< 90°", fill: "rgba(251, 191, 36, 0.20)", stroke: "#ffd166", glow: "rgba(255, 209, 102, 0.55)" },
      { type: "right", label: "RIGHT", sub: "= 90°", fill: "rgba(37, 99, 235, 0.22)", stroke: "#5ee9ff", glow: "rgba(94, 233, 255, 0.55)" },
      { type: "obtuse", label: "OBTUSE", sub: "> 90°", fill: "rgba(236, 72, 153, 0.22)", stroke: "#ff7de9", glow: "rgba(255, 125, 233, 0.55)" }
    ];

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    let questions = shuffle(questionBank);

    function makeStars() {
      stars = [];
      const count = Math.max(55, Math.min(130, Math.floor(W * H / 3600)));
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.5 + 0.4,
          a: Math.random() * 0.75 + 0.2,
          speed: Math.random() * 0.24 + 0.04
        });
      }
    }

    function resize() {
      const rect = gameArea.getBoundingClientRect();
      const dpr = Math.max(1, Math.min(devicePixelRatio || 1, 2));
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      W = rect.width;
      H = rect.height;

      binMargin = Math.max(6, W * 0.02);
      binGap = Math.max(4, W * 0.012);
      binHeight = Math.max(78, Math.min(108, H * 0.18));
      binTop = H - binHeight - 8;
      binWidth = (W - binMargin * 2 - binGap * 2) / 3;

      if (current) {
        current.cardW = Math.max(112, Math.min(160, W * 0.38));
        current.cardH = Math.max(96, Math.min(136, H * 0.20));
        current.rocketH = current.cardH + Math.max(38, current.cardH * 0.38);
        current.x = clamp(current.x, current.cardW / 2 + 8, W - current.cardW / 2 - 8);
      }
      makeStars();
      draw();
    }

    function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }

    function startAudio() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) {}
    }

    function beep(good) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = good ? "sine" : "square";
      osc.frequency.setValueAtTime(good ? 660 : 170, now);
      osc.frequency.exponentialRampToValueAtTime(good ? 880 : 120, now + 0.12);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.12, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.18);
    }

    function startGame() {
      startAudio();
      score = 0; qNo = 0; particles = []; flash = null;
      questions = shuffle(questionBank);
      running = true;
      startOverlay.style.display = "none";
      endOverlay.style.display = "none";
      scoreEl.textContent = score;
      qNoEl.textContent = qNo;
      nextAngle();
      if (raf) cancelAnimationFrame(raf);
      loop();
    }

    function endGame() {
      running = false;
      if (raf) cancelAnimationFrame(raf);
      endTitle.textContent = score >= 8 ? "Excellent Docking!" : "Good Practice!";
      endText.textContent = "You docked " + score + " out of " + TOTAL + " angles correctly.";
      endOverlay.style.display = "grid";
      draw();
    }

    function nextAngle() {
      if (qNo >= TOTAL) { endGame(); return; }
      const data = questions[qNo];
      qNo += 1;
      qNoEl.textContent = qNo;
      scoreEl.textContent = score;

      const cardW = Math.max(112, Math.min(160, W * 0.38));
      const cardH = Math.max(96, Math.min(136, H * 0.20));
      current = {
        type: data.type,
        deg: data.deg,
        x: W / 2,
        y: -(cardH + 60),
        cardW,
        cardH,
        rocketH: cardH + Math.max(38, cardH * 0.38),
        speed: Math.max(1.6, Math.min(2.8, H / 245)),
        landed: false,
        wobble: Math.random() * Math.PI * 2
      };
    }

    function answerText(type, deg) {
      if (type === "acute") return deg + "° is smaller than 90°.";
      if (type === "right") return deg + "° is exactly 90°.";
      return deg + "° is bigger than 90°.";
    }

    function showFeedback(text, good) {
      clearTimeout(feedbackTimer);
      feedbackEl.textContent = text;
      feedbackEl.style.borderColor = good ? "#22c55e" : "#ef4444";
      feedbackEl.style.boxShadow = good
        ? "0 0 24px rgba(34, 197, 94, 0.55)"
        : "0 0 24px rgba(239, 68, 68, 0.55)";
      feedbackEl.style.color = good ? "#dcfce7" : "#fee2e2";
      feedbackEl.classList.add("show");
      feedbackTimer = setTimeout(() => feedbackEl.classList.remove("show"), 1000);
    }

    function getBinAtX(x) {
      for (let i = 0; i < 3; i++) {
        const bx = binMargin + i * (binWidth + binGap);
        if (x >= bx && x <= bx + binWidth) return { ...bins[i], index: i };
      }
      return null;
    }

    function burst(x, y, good, colour) {
      const n = good ? 28 : 16;
      for (let i = 0; i < n; i++) {
        const ang = Math.random() * Math.PI * 2;
        const speed = Math.random() * (good ? 4.5 : 3.2) + 1.2;
        particles.push({
          x, y,
          vx: Math.cos(ang) * speed,
          vy: Math.sin(ang) * speed,
          life: good ? 34 : 24,
          maxLife: good ? 34 : 24,
          r: Math.random() * 3 + 2,
          colour: colour || (good ? "#22c55e" : "#ef4444")
        });
      }
    }

    function checkLanding() {
      if (!current || current.landed) return;
      if (current.y + current.rocketH / 2 >= binTop + 6) {
        current.landed = true;
        const caught = getBinAtX(current.x);
        const fx = caught ? binMargin + caught.index * (binWidth + binGap) + binWidth / 2 : current.x;
        const fy = binTop + binHeight * 0.25;

        if (caught && caught.type === current.type) {
          score += 1;
          scoreEl.textContent = score;
          showFeedback("Correct Dock!", true);
          burst(fx, fy, true, caught.stroke);
          flash = { type: "good", life: 18, binIndex: caught.index };
          beep(true);
        } else {
          showFeedback(answerText(current.type, current.deg), false);
          burst(current.x, binTop + 12, false, "#ef4444");
          flash = { type: "bad", life: 18, binIndex: caught ? caught.index : -1 };
          beep(false);
        }
        setTimeout(nextAngle, 760);
      }
    }

    function updateParticles() {
      particles = particles.filter(p => p.life > 0);
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.96; p.vy *= 0.96;
        p.life -= 1;
      }
    }

    function updateStars() {
      for (const s of stars) {
        s.y += s.speed;
        if (s.y > H) {
          s.y = 0; s.x = Math.random() * W;
        }
      }
    }

    function update() {
      if (!running || !current) { updateParticles(); updateStars(); return; }
      const moveSpeed = Math.max(5.8, W * 0.018);
      if (leftHeld || keys.ArrowLeft) current.x -= moveSpeed;
      if (rightHeld || keys.ArrowRight) current.x += moveSpeed;
      current.x = clamp(current.x, current.cardW / 2 + 8, W - current.cardW / 2 - 8);

      if (!current.landed) {
        current.y += current.speed;
        current.wobble += 0.05;
        checkLanding();
      }

      updateParticles();
      updateStars();

      if (flash) {
        flash.life -= 1;
        if (flash.life <= 0) flash = null;
      }
    }

    function roundRect(x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.lineTo(x + w - rr, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
      ctx.lineTo(x + w, y + h - rr);
      ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
      ctx.lineTo(x + rr, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
      ctx.lineTo(x, y + rr);
      ctx.quadraticCurveTo(x, y, x + rr, y);
      ctx.closePath();
    }

    function drawBackground() {
      ctx.clearRect(0, 0, W, H);
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, "#06152d");
      grad.addColorStop(0.55, "#071329");
      grad.addColorStop(1, "#020617");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      let g = ctx.createRadialGradient(W * 0.15, H * 0.18, 10, W * 0.15, H * 0.18, W * 0.52);
      g.addColorStop(0, "rgba(94, 233, 255, 0.18)");
      g.addColorStop(1, "rgba(94, 233, 255, 0)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      g = ctx.createRadialGradient(W * 0.85, H * 0.28, 10, W * 0.85, H * 0.28, W * 0.48);
      g.addColorStop(0, "rgba(255, 125, 233, 0.16)");
      g.addColorStop(1, "rgba(255, 125, 233, 0)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      // planet
      ctx.save();
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = "#3b82f6";
      ctx.beginPath();
      ctx.arc(W * 0.82, H * 0.16, Math.max(20, W * 0.08), 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(94,233,255,0.8)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(W * 0.82, H * 0.16, Math.max(34, W * 0.13), Math.max(7, W * 0.025), -0.35, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();

      // stars
      for (const s of stars) {
        ctx.fillStyle = "rgba(255,255,255," + s.a + ")";
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = "rgba(2, 6, 23, 0.58)";
      ctx.strokeStyle = "rgba(94, 233, 255, 0.35)";
      ctx.lineWidth = 1;
      roundRect(10, 10, Math.min(W - 20, 350), 38, 13);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#dbeafe";
      ctx.font = "800 " + Math.max(13, Math.min(16, W * 0.04)) + "px Arial";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText("Guide the rocket into the correct dock.", 22, 29);
    }

    function drawBins() {
      for (let i = 0; i < 3; i++) {
        const b = bins[i];
        const x = binMargin + i * (binWidth + binGap);
        const y = binTop;
        const activeFlash = flash && flash.binIndex === i;

        ctx.save();
        ctx.shadowColor = activeFlash
          ? (flash.type === "good" ? "rgba(34, 197, 94, 0.9)" : "rgba(239, 68, 68, 0.9)")
          : b.glow;
        ctx.shadowBlur = activeFlash ? 28 : 16;

        const bodyGrad = ctx.createLinearGradient(x, y, x, y + binHeight);
        bodyGrad.addColorStop(0, "rgba(255,255,255,0.12)");
        bodyGrad.addColorStop(0.45, b.fill);
        bodyGrad.addColorStop(1, "rgba(2,6,23,0.65)");

        ctx.fillStyle = bodyGrad;
        ctx.strokeStyle = activeFlash
          ? (flash.type === "good" ? "#22c55e" : "#ef4444")
          : b.stroke;
        ctx.lineWidth = Math.max(3, W * 0.008);
        roundRect(x, y, binWidth, binHeight, 16);
        ctx.fill();
        ctx.stroke();

        ctx.shadowColor = "transparent";
        ctx.fillStyle = "rgba(2, 6, 23, 0.55)";
        roundRect(x + 8, y + 8, binWidth - 16, binHeight * 0.25, 9);
        ctx.fill();

        for (let k = 0; k < 3; k++) {
          ctx.fillStyle = k === 1 ? b.stroke : "rgba(255,255,255,0.55)";
          ctx.beginPath();
          ctx.arc(x + binWidth * (0.28 + k * 0.22), y + 20, 3, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "900 " + Math.max(15, Math.min(24, binHeight * 0.26)) + "px Arial";
        ctx.shadowColor = b.glow;
        ctx.shadowBlur = 10;
        ctx.fillText(b.label, x + binWidth / 2, y + binHeight * 0.49);

        ctx.fillStyle = "#dbeafe";
        ctx.font = "900 " + Math.max(13, Math.min(19, binHeight * 0.19)) + "px Arial";
        ctx.shadowBlur = 0;
        ctx.fillText(b.sub, x + binWidth / 2, y + binHeight * 0.73);

        ctx.restore();
      }
    }

    function drawAngleRocket(a) {
      if (!a) return;

      ctx.save();
      const floatX = Math.sin(a.wobble) * 2.5;
      ctx.translate(a.x + floatX, a.y);

      const cardW = a.cardW;
      const cardH = a.cardH;
      const rocketBaseY = cardH * 0.45;
      const rad = -a.deg * Math.PI / 180;
      const rayLen = Math.min(cardW * 0.42, cardH * 0.52);
      const vertexX = 0;
      const vertexY = 0;

      // rocket body behind the panel
      const bodyW = cardW * 0.34;
      const bodyH = cardH * 0.55;
      const bodyX = -bodyW / 2;
      const bodyY = cardH * 0.30;

      ctx.shadowColor = "rgba(94,233,255,0.25)";
      ctx.shadowBlur = 14;
      const rocketGrad = ctx.createLinearGradient(0, bodyY, 0, bodyY + bodyH);
      rocketGrad.addColorStop(0, "#dbeafe");
      rocketGrad.addColorStop(0.45, "#94a3b8");
      rocketGrad.addColorStop(1, "#475569");
      ctx.fillStyle = rocketGrad;
      ctx.strokeStyle = "#5ee9ff";
      ctx.lineWidth = 2.5;

      // nose
      ctx.beginPath();
      ctx.moveTo(0, bodyY - 22);
      ctx.lineTo(bodyX + bodyW, bodyY + 6);
      ctx.lineTo(bodyX, bodyY + 6);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      roundRect(bodyX, bodyY, bodyW, bodyH, 12);
      ctx.fill();
      ctx.stroke();

      // fins
      ctx.fillStyle = "#ef4444";
      ctx.strokeStyle = "#fecaca";
      ctx.beginPath();
      ctx.moveTo(bodyX + 4, bodyY + bodyH - 8);
      ctx.lineTo(bodyX - 16, bodyY + bodyH + 16);
      ctx.lineTo(bodyX + 8, bodyY + bodyH + 5);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(bodyX + bodyW - 4, bodyY + bodyH - 8);
      ctx.lineTo(bodyX + bodyW + 16, bodyY + bodyH + 16);
      ctx.lineTo(bodyX + bodyW - 8, bodyY + bodyH + 5);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // thrusters
      ctx.fillStyle = "#334155";
      ctx.beginPath();
      ctx.roundRect(-12, bodyY + bodyH - 2, 10, 12, 4);
      ctx.roundRect(2, bodyY + bodyH - 2, 10, 12, 4);
      ctx.fill();

      ctx.fillStyle = "rgba(94,233,255,0.55)";
      ctx.beginPath();
      ctx.ellipse(-7, bodyY + bodyH + 16, 5, 14, 0, 0, Math.PI * 2);
      ctx.ellipse(7, bodyY + bodyH + 16, 5, 14, 0, 0, Math.PI * 2);
      ctx.fill();

      // hologram angle panel in front
      ctx.shadowColor = "rgba(94, 233, 255, 0.75)";
      ctx.shadowBlur = 22;
      const panelGrad = ctx.createLinearGradient(0, -cardH / 2, 0, cardH / 2);
      panelGrad.addColorStop(0, "rgba(94, 233, 255, 0.28)");
      panelGrad.addColorStop(0.45, "rgba(15, 23, 42, 0.94)");
      panelGrad.addColorStop(1, "rgba(37, 99, 235, 0.34)");

      ctx.fillStyle = panelGrad;
      ctx.strokeStyle = "#5ee9ff";
      ctx.lineWidth = 3;
      roundRect(-cardW / 2, -cardH / 2, cardW, cardH, 18);
      ctx.fill();
      ctx.stroke();

      ctx.shadowColor = "transparent";

      // corner bolts
      ctx.fillStyle = "#5ee9ff";
      const bolt = 4;
      [[-cardW/2 + 16, -cardH/2 + 16],[cardW/2 - 16, -cardH/2 + 16],[-cardW/2 + 16, cardH/2 - 16],[cardW/2 - 16, cardH/2 - 16]]
        .forEach(([bx, by]) => {
          ctx.beginPath();
          ctx.arc(bx, by, bolt, 0, Math.PI * 2);
          ctx.fill();
        });

      // original angle drawing only (no degree, no answer label)
      ctx.lineCap = "round";
      ctx.strokeStyle = "#ffffff";
      ctx.shadowColor = "rgba(255,255,255,0.8)";
      ctx.shadowBlur = 8;
      ctx.lineWidth = Math.max(6, cardW * 0.047);

      ctx.beginPath();
      ctx.moveTo(vertexX, vertexY + 10);
      ctx.lineTo(vertexX + rayLen, vertexY + 10);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(vertexX, vertexY + 10);
      ctx.lineTo(vertexX + rayLen * Math.cos(rad), vertexY + 10 + rayLen * Math.sin(rad));
      ctx.stroke();

      ctx.shadowBlur = 0;
      ctx.strokeStyle = "#5ee9ff";
      ctx.lineWidth = Math.max(3, cardW * 0.025);
      ctx.beginPath();
      ctx.arc(vertexX, vertexY + 10, rayLen * 0.38, 0, rad, true);
      ctx.stroke();

      if (a.deg === 90) {
        const s = rayLen * 0.28;
        ctx.strokeStyle = "#ffd166";
        ctx.lineWidth = Math.max(3, cardW * 0.025);
        ctx.beginPath();
        ctx.moveTo(vertexX + s, vertexY + 10);
        ctx.lineTo(vertexX + s, vertexY + 10 - s);
        ctx.lineTo(vertexX, vertexY + 10 - s);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawParticles() {
      for (const p of particles) {
        const alpha = p.life / p.maxLife;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.colour;
        ctx.shadowColor = p.colour;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function draw() {
      drawBackground();
      drawBins();
      drawAngleRocket(current);
      drawParticles();
    }

    function loop() {
      update();
      draw();
      raf = requestAnimationFrame(loop);
    }

    function pointerPos(e) {
      const rect = canvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function onDockArea(y) {
      return y >= binTop - 6;
    }

    canvas.addEventListener("pointerdown", (e) => {
      if (!running || !current || current.landed) return;
      const p = pointerPos(e);
      if (onDockArea(p.y)) return; // disable moving upon touching docks
      isDraggingAngle = true;
      current.x = clamp(p.x, current.cardW / 2 + 8, W - current.cardW / 2 - 8);
      canvas.setPointerCapture(e.pointerId);
    });

    canvas.addEventListener("pointermove", (e) => {
      if (!running || !current || current.landed || !isDraggingAngle) return;
      const p = pointerPos(e);
      if (onDockArea(p.y)) return; // do not move when pointer is on docks
      current.x = clamp(p.x, current.cardW / 2 + 8, W - current.cardW / 2 - 8);
    });

    canvas.addEventListener("pointerup", () => { isDraggingAngle = false; });
    canvas.addEventListener("pointercancel", () => { isDraggingAngle = false; });

    function holdButton(btn, direction) {
      btn.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (direction < 0) leftHeld = true;
        else rightHeld = true;
      });
      btn.addEventListener("pointerup", () => { if (direction < 0) leftHeld = false; else rightHeld = false; });
      btn.addEventListener("pointercancel", () => { if (direction < 0) leftHeld = false; else rightHeld = false; });
      btn.addEventListener("pointerleave", () => { if (direction < 0) leftHeld = false; else rightHeld = false; });
    }

    holdButton(document.getElementById("leftBtn"), -1);
    holdButton(document.getElementById("rightBtn"), 1);

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
        keys[e.key] = true;
        e.preventDefault();
      }
    });
    document.addEventListener("keyup", (e) => { keys[e.key] = false; });

    document.getElementById("startBtn").addEventListener("click", startGame);
    document.getElementById("restartBtn").addEventListener("click", startGame);

    window.addEventListener("resize", resize);
    window.addEventListener("orientationchange", () => setTimeout(resize, 200));
    resize();
    draw();
  </script>
</body>
</html>
