<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Angle Drop Sorter Mobile</title>
  <style>
    :root {
      --bg: #eef2ff;
      --panel: #ffffff;
      --ink: #111827;
      --muted: #6b7280;
      --line: #d1d5db;
      --blue: #2563eb;
      --good: #16a34a;
      --bad: #dc2626;
      --acute: #fef3c7;
      --right: #dbeafe;
      --obtuse: #fce7f3;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      touch-action: none;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      width: 100vw;
      height: 100dvh;
      max-width: 920px;
      background: var(--panel);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      overflow: hidden;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(17px, 5vw, 28px);
      line-height: 1.05;
      white-space: nowrap;
    }

    .scorebar {
      display: flex;
      gap: 5px;
      align-items: center;
      font-weight: 900;
      font-size: clamp(12px, 3.5vw, 16px);
      white-space: nowrap;
    }

    .pill {
      border: 1px solid #e5e7eb;
      background: #f3f4f6;
      border-radius: 999px;
      padding: 6px 8px;
    }

    .rulebar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      padding: 6px 8px;
      background: #f9fafb;
      border-bottom: 1px solid var(--line);
      text-align: center;
      font-weight: 900;
      font-size: clamp(11px, 3vw, 15px);
      line-height: 1.15;
    }

    .rulebar div {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 6px 2px;
    }

    .rulebar div:nth-child(1) { background: var(--acute); }
    .rulebar div:nth-child(2) { background: var(--right); }
    .rulebar div:nth-child(3) { background: var(--obtuse); }

    .game-area {
      position: relative;
      min-height: 0;
      background: linear-gradient(#eff6ff, #ffffff);
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    .feedback {
      position: absolute;
      left: 50%;
      top: 8px;
      transform: translateX(-50%);
      z-index: 4;
      max-width: 94vw;
      padding: 8px 12px;
      border: 3px solid #e5e7eb;
      border-radius: 999px;
      background: white;
      color: #111827;
      box-shadow: 0 8px 20px rgba(0,0,0,0.16);
      text-align: center;
      font-size: clamp(15px, 4vw, 22px);
      font-weight: 900;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s ease;
    }

    .feedback.show {
      opacity: 1;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 14px;
      background: rgba(255,255,255,0.92);
      text-align: center;
    }

    .card {
      width: min(520px, 94vw);
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 22px;
      box-shadow: 0 14px 35px rgba(0,0,0,0.16);
      padding: 18px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: clamp(25px, 8vw, 40px);
      line-height: 1.05;
    }

    .card p {
      margin: 8px 0;
      font-size: clamp(15px, 4vw, 18px);
      line-height: 1.35;
      color: #374151;
    }

    .btn {
      border: 0;
      border-radius: 16px;
      background: var(--blue);
      color: white;
      font-size: clamp(18px, 5vw, 23px);
      font-weight: 900;
      padding: 13px 24px;
      margin-top: 10px;
      box-shadow: 0 6px 0 #1d4ed8;
      cursor: pointer;
    }

    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #1d4ed8;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 8px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      background: #ffffff;
      border-top: 1px solid var(--line);
    }

    .move {
      border: 0;
      border-radius: 18px;
      min-height: 58px;
      background: #111827;
      color: white;
      font-size: clamp(24px, 8vw, 36px);
      font-weight: 900;
      cursor: pointer;
      touch-action: manipulation;
    }

    .move:active {
      transform: scale(0.98);
    }

    @media (min-width: 700px) {
      .app {
        height: min(100dvh, 760px);
        border-radius: 24px;
        box-shadow: 0 16px 42px rgba(0,0,0,0.16);
      }

      .top {
        padding: 12px 16px;
      }

      .rulebar {
        padding: 8px 14px;
        gap: 10px;
      }

      .controls {
        padding: 12px 16px 16px;
      }
    }

    @media (max-height: 610px) {
      .rulebar {
        display: none;
      }

      .move {
        min-height: 48px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <h1>Angle Drop Sorter</h1>
      <div class="scorebar">
        <span class="pill"><span id="qNo">0</span>/<span id="total">10</span></span>
        <span class="pill">Score <span id="score">0</span></span>
      </div>
    </header>

    <section class="rulebar" aria-label="Angle guide">
      <div>Acute<br>&lt; 90°</div>
      <div>Right<br>= 90°</div>
      <div>Obtuse<br>&gt; 90°</div>
    </section>

    <section class="game-area" id="gameArea">
      <canvas id="game"></canvas>
      <div class="feedback" id="feedback"></div>

      <div class="overlay" id="startOverlay">
        <div class="card">
          <h2>Sort the Angles</h2>
          <p>Move the falling angle left or right.</p>
          <p>Drop it into the correct bin.</p>
          <p>The angle shows its degree, but it does not show the answer label.</p>
          <button class="btn" id="startBtn">Start</button>
        </div>
      </div>

      <div class="overlay" id="endOverlay" style="display:none;">
        <div class="card">
          <h2 id="endTitle">Well done!</h2>
          <p id="endText"></p>
          <button class="btn" id="restartBtn">Play Again</button>
        </div>
      </div>
    </section>

    <footer class="controls">
      <button class="move" id="leftBtn" aria-label="Move angle left">←</button>
      <button class="move" id="rightBtn" aria-label="Move angle right">→</button>
    </footer>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const gameArea = document.getElementById("gameArea");

    const qNoEl = document.getElementById("qNo");
    const totalEl = document.getElementById("total");
    const scoreEl = document.getElementById("score");
    const feedbackEl = document.getElementById("feedback");
    const startOverlay = document.getElementById("startOverlay");
    const endOverlay = document.getElementById("endOverlay");
    const endTitle = document.getElementById("endTitle");
    const endText = document.getElementById("endText");

    const TOTAL = 10;
    totalEl.textContent = TOTAL;

    let W = 360;
    let H = 520;
    let score = 0;
    let qNo = 0;
    let running = false;
    let current = null;
    let raf = null;
    let leftHeld = false;
    let rightHeld = false;
    let keys = {};
    let feedbackTimer = null;

    let binTop = 0;
    let binHeight = 92;
    let binMargin = 8;
    let binGap = 5;
    let binWidth = 0;

    const questionBank = [
      { type: "acute", deg: 30 },
      { type: "acute", deg: 40 },
      { type: "acute", deg: 55 },
      { type: "acute", deg: 65 },
      { type: "right", deg: 90 },
      { type: "right", deg: 90 },
      { type: "obtuse", deg: 110 },
      { type: "obtuse", deg: 125 },
      { type: "obtuse", deg: 140 },
      { type: "obtuse", deg: 150 }
    ];

    const bins = [
      { type: "acute", label: "ACUTE", sub: "< 90°", fill: "#fef3c7", stroke: "#b45309" },
      { type: "right", label: "RIGHT", sub: "= 90°", fill: "#dbeafe", stroke: "#1d4ed8" },
      { type: "obtuse", label: "OBTUSE", sub: "> 90°", fill: "#fce7f3", stroke: "#be185d" }
    ];

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    let questions = shuffle(questionBank);

    function resize() {
      const rect = gameArea.getBoundingClientRect();
      const dpr = Math.max(1, Math.min(devicePixelRatio || 1, 2));

      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      W = rect.width;
      H = rect.height;

      binMargin = Math.max(6, W * 0.02);
      binGap = Math.max(4, W * 0.012);
      binHeight = Math.max(78, Math.min(106, H * 0.18));
      binTop = H - binHeight - 8;
      binWidth = (W - binMargin * 2 - binGap * 2) / 3;

      if (current) {
        current.x = clamp(current.x, current.cardW / 2 + 4, W - current.cardW / 2 - 4);
      }

      draw();
    }

    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function startGame() {
      score = 0;
      qNo = 0;
      questions = shuffle(questionBank);
      running = true;
      startOverlay.style.display = "none";
      endOverlay.style.display = "none";
      scoreEl.textContent = score;
      qNoEl.textContent = qNo;
      nextAngle();
      if (raf) cancelAnimationFrame(raf);
      loop();
    }

    function endGame() {
      running = false;
      if (raf) cancelAnimationFrame(raf);
      endTitle.textContent = score >= 8 ? "Excellent sorting!" : "Good practice!";
      endText.textContent = "You scored " + score + " out of " + TOTAL + ".";
      endOverlay.style.display = "grid";
      draw();
    }

    function nextAngle() {
      if (qNo >= TOTAL) {
        endGame();
        return;
      }

      const data = questions[qNo];
      qNo += 1;
      qNoEl.textContent = qNo;
      scoreEl.textContent = score;

      const cardW = Math.max(120, Math.min(180, W * 0.42));
      const cardH = Math.max(112, Math.min(150, H * 0.22));
      current = {
        type: data.type,
        deg: data.deg,
        x: W / 2,
        y: -cardH / 2 - 8,
        cardW,
        cardH,
        speed: Math.max(1.6, Math.min(2.8, H / 245)),
        landed: false
      };
    }

    function answerText(type, deg) {
      if (type === "acute") return deg + "° is smaller than 90°.";
      if (type === "right") return deg + "° is exactly 90°.";
      return deg + "° is bigger than 90°.";
    }

    function showFeedback(text, good) {
      clearTimeout(feedbackTimer);
      feedbackEl.textContent = text;
      feedbackEl.style.borderColor = good ? "#16a34a" : "#dc2626";
      feedbackEl.style.color = good ? "#166534" : "#991b1b";
      feedbackEl.classList.add("show");
      feedbackTimer = setTimeout(() => feedbackEl.classList.remove("show"), 1000);
    }

    function getBinAtX(x) {
      for (let i = 0; i < 3; i++) {
        const bx = binMargin + i * (binWidth + binGap);
        if (x >= bx && x <= bx + binWidth) return bins[i].type;
      }
      return null;
    }

    function checkLanding() {
      if (!current || current.landed) return;

      if (current.y + current.cardH / 2 >= binTop + 6) {
        current.landed = true;
        const caught = getBinAtX(current.x);

        if (caught === current.type) {
          score += 1;
          scoreEl.textContent = score;
          showFeedback("Correct!", true);
        } else {
          showFeedback(answerText(current.type, current.deg), false);
        }

        setTimeout(nextAngle, 720);
      }
    }

    function update() {
      if (!running || !current) return;

      const moveSpeed = Math.max(5.5, W * 0.017);

      if (leftHeld || keys.ArrowLeft) current.x -= moveSpeed;
      if (rightHeld || keys.ArrowRight) current.x += moveSpeed;

      current.x = clamp(current.x, current.cardW / 2 + 4, W - current.cardW / 2 - 4);

      if (!current.landed) {
        current.y += current.speed;
        checkLanding();
      }
    }

    function drawBackground() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#eff6ff";
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = "rgba(37,99,235,0.08)";
      ctx.lineWidth = 1;
      const gap = 34;
      for (let x = 0; x < W; x += gap) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = 0; y < H; y += gap) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }

      ctx.fillStyle = "rgba(255,255,255,0.82)";
      roundRect(10, 10, Math.min(W - 20, 310), 38, 13);
      ctx.fill();

      ctx.fillStyle = "#374151";
      ctx.font = "800 " + Math.max(13, Math.min(16, W * 0.04)) + "px Arial";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText("Move the angle into the correct bin.", 22, 29);
    }

    function drawBins() {
      for (let i = 0; i < 3; i++) {
        const b = bins[i];
        const x = binMargin + i * (binWidth + binGap);
        const y = binTop;

        ctx.save();
        ctx.shadowColor = "rgba(0,0,0,0.12)";
        ctx.shadowBlur = 9;
        ctx.shadowOffsetY = 4;

        ctx.fillStyle = b.fill;
        ctx.strokeStyle = b.stroke;
        ctx.lineWidth = Math.max(3, W * 0.008);
        roundRect(x, y, binWidth, binHeight, 15);
        ctx.fill();
        ctx.stroke();

        ctx.shadowColor = "transparent";
        ctx.fillStyle = "#111827";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "900 " + Math.max(15, Math.min(24, binHeight * 0.26)) + "px Arial";
        ctx.fillText(b.label, x + binWidth / 2, y + binHeight * 0.38);

        ctx.fillStyle = "#374151";
        ctx.font = "900 " + Math.max(13, Math.min(19, binHeight * 0.19)) + "px Arial";
        ctx.fillText(b.sub, x + binWidth / 2, y + binHeight * 0.68);
        ctx.restore();
      }
    }

    function drawAngle(a) {
      if (!a) return;

      ctx.save();
      ctx.translate(a.x, a.y);

      const cardW = a.cardW;
      const cardH = a.cardH;
      const stroke = "#111827";
      const accent = "#2563eb";

      ctx.fillStyle = "rgba(255,255,255,0.95)";
      ctx.strokeStyle = "#111827";
      ctx.lineWidth = 3;
      ctx.shadowColor = "rgba(0,0,0,0.15)";
      ctx.shadowBlur = 10;
      ctx.shadowOffsetY = 4;
      roundRect(-cardW / 2, -cardH / 2, cardW, cardH, 18);
      ctx.fill();
      ctx.stroke();

      ctx.shadowColor = "transparent";

      const vertexX = 0;
      const vertexY = cardH * 0.22;
      const rayLen = Math.min(cardW * 0.43, cardH * 0.57);
      const rad = -a.deg * Math.PI / 180;

      ctx.lineCap = "round";
      ctx.strokeStyle = stroke;
      ctx.lineWidth = Math.max(6, cardW * 0.045);

      ctx.beginPath();
      ctx.moveTo(vertexX, vertexY);
      ctx.lineTo(vertexX + rayLen, vertexY);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(vertexX, vertexY);
      ctx.lineTo(vertexX + rayLen * Math.cos(rad), vertexY + rayLen * Math.sin(rad));
      ctx.stroke();

      ctx.strokeStyle = accent;
      ctx.lineWidth = Math.max(3, cardW * 0.025);
      ctx.beginPath();
      ctx.arc(vertexX, vertexY, rayLen * 0.38, 0, rad, true);
      ctx.stroke();

      if (a.deg === 90) {
        const s = rayLen * 0.28;
        ctx.strokeStyle = "#1d4ed8";
        ctx.lineWidth = Math.max(3, cardW * 0.025);
        ctx.beginPath();
        ctx.moveTo(vertexX + s, vertexY);
        ctx.lineTo(vertexX + s, vertexY - s);
        ctx.lineTo(vertexX, vertexY - s);
        ctx.stroke();
      }

      // Degree stays visible. No acute/right/obtuse answer label is shown here.
      ctx.fillStyle = "#111827";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "900 " + Math.max(25, Math.min(36, cardW * 0.22)) + "px Arial";
      ctx.fillText(a.deg + "°", 0, -cardH * 0.32);

      ctx.restore();
    }

    function roundRect(x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.lineTo(x + w - rr, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
      ctx.lineTo(x + w, y + h - rr);
      ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
      ctx.lineTo(x + rr, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
      ctx.lineTo(x, y + rr);
      ctx.quadraticCurveTo(x, y, x + rr, y);
      ctx.closePath();
    }

    function draw() {
      drawBackground();
      drawBins();
      drawAngle(current);
    }

    function loop() {
      update();
      draw();
      raf = requestAnimationFrame(loop);
    }

    function pointerX(e) {
      const rect = canvas.getBoundingClientRect();
      return e.clientX - rect.left;
    }

    canvas.addEventListener("pointerdown", (e) => {
      if (!running || !current || current.landed) return;
      current.x = clamp(pointerX(e), current.cardW / 2 + 4, W - current.cardW / 2 - 4);
      canvas.setPointerCapture(e.pointerId);
    });

    canvas.addEventListener("pointermove", (e) => {
      if (!running || !current || current.landed) return;
      if (e.buttons === 1 || e.pointerType === "touch") {
        current.x = clamp(pointerX(e), current.cardW / 2 + 4, W - current.cardW / 2 - 4);
      }
    });

    function holdButton(btn, direction) {
      btn.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (direction < 0) leftHeld = true;
        else rightHeld = true;
      });

      btn.addEventListener("pointerup", () => {
        if (direction < 0) leftHeld = false;
        else rightHeld = false;
      });

      btn.addEventListener("pointercancel", () => {
        if (direction < 0) leftHeld = false;
        else rightHeld = false;
      });

      btn.addEventListener("pointerleave", () => {
        if (direction < 0) leftHeld = false;
        else rightHeld = false;
      });
    }

    holdButton(document.getElementById("leftBtn"), -1);
    holdButton(document.getElementById("rightBtn"), 1);

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
        keys[e.key] = true;
        e.preventDefault();
      }
    });

    document.addEventListener("keyup", (e) => {
      keys[e.key] = false;
    });

    document.getElementById("startBtn").addEventListener("click", startGame);
    document.getElementById("restartBtn").addEventListener("click", startGame);

    window.addEventListener("resize", resize);
    window.addEventListener("orientationchange", () => setTimeout(resize, 200));
    resize();
    draw();
  </script>
</body>
</html>
